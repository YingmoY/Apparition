<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apparition - 登录</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/layui/2.9.25/css/layui.css" />
  <style>
    body { min-height: 100vh; margin: 0; background: radial-gradient(circle at 20% 20%, #f4f8ff, #e8f0ff 45%, #dfe9f7 100%); font-family: "Segoe UI", "Microsoft YaHei", sans-serif; display: flex; align-items: center; justify-content: center; }
    .card { width: 360px; background: rgba(255,255,255,0.95); border-radius: 16px; box-shadow: 0 16px 40px rgba(43,70,130,0.18); padding: 26px; }
    .title { margin: 0 0 18px; font-size: 24px; font-weight: 700; color: #213b66; }
    .helper { margin-top: 12px; color: #4f5f77; text-align: right; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">用户登录</h1>
    <div class="layui-form" lay-filter="loginForm">
      <div class="layui-form-item">
        <input class="layui-input" type="text" name="email" placeholder="邮箱或管理员账号" autocomplete="username" required />
      </div>
      <div class="layui-form-item">
        <input class="layui-input" type="password" name="password" placeholder="密码" autocomplete="current-password" required />
      </div>
      <div class="layui-form-item">
        <input type="checkbox" name="rememberMe" title="7天免登录" />
      </div>
      <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="submitLogin">登录</button>
      <div class="helper">没有账号？<a href="/register">去注册</a></div>
    </div>
  </div>
  <script src="https://cdn.bootcdn.net/ajax/libs/layui/2.9.25/layui.js"></script>
  <script>
    layui.use(["form", "layer"], function () {
      var form = layui.form, layer = layui.layer;
      form.on("submit(submitLogin)", function (obj) {
        fetch("/api/v1/auth/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ email: obj.field.email, password: obj.field.password, rememberMe: !!obj.field.rememberMe })
        }).then(function (res) { return res.json().then(function (d) { return { ok: res.ok, data: d }; }); })
          .then(function (r) {
            if (!r.ok) { layer.msg(r.data.message || "登录失败"); return; }
            location.href = "/dashboard";
          });
        return false;
      });
    });
  </script>
</body>
</html>
