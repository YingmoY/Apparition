<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apparition - 管理后台</title>
  <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.9.17/css/layui.css" />
  <style>
    body { margin: 0; background: linear-gradient(130deg, #fff8f1, #fde9da); font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    .panel { max-width: 980px; margin: 24px auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(110, 63, 15, 0.18); }
  </style>
</head>
<body>
  <div class="panel">
    <h2>管理员后台</h2>
  <p>管理员可查看用户与打卡执行记录。</p>
    <button id="back" class="layui-btn layui-btn-primary">返回控制台</button>
    <button id="logout" class="layui-btn layui-btn-danger">退出登录</button>
    <hr />
    <div id="status">正在校验权限...</div>

  <h3>用户列表</h3>
  <table class="layui-table">
    <thead><tr><th>ID</th><th>邮箱</th><th>角色</th><th>状态</th><th>最近登录</th></tr></thead>
    <tbody id="usersBody"></tbody>
  </table>

  <h3>打卡执行记录</h3>
  <table class="layui-table">
    <thead><tr><th>ID</th><th>用户</th><th>状态</th><th>触发</th><th>开始时间</th><th>消息</th></tr></thead>
    <tbody id="runsBody"></tbody>
  </table>

  <h3>审计日志</h3>
  <table class="layui-table">
    <thead><tr><th>ID</th><th>用户</th><th>动作</th><th>目标</th><th>摘要</th><th>时间</th></tr></thead>
    <tbody id="logsBody"></tbody>
  </table>
  </div>
  <script src="https://cdn.staticfile.org/layui/2.9.17/layui.js"></script>
  <script>
    layui.use(["layer"], function () {
      const layer = layui.layer;
      fetch("/api/v1/auth/me").then(function(res){ return res.json().then(function(data){ return {res:res, data:data}; }); }).then(function(result){
        if (!result.res.ok) {
          location.href = "/login";
          return;
        }
        if (result.data.data.role !== "admin") {
          layer.msg("无管理员权限");
          setTimeout(function(){ location.href = "/dashboard"; }, 600);
          return;
        }
        document.getElementById("status").textContent = "管理员身份已确认: " + result.data.data.email;
    loadUsers();
    loadRuns();
    loadLogs();
      });

    async function loadUsers() {
    const res = await fetch("/api/v1/admin/users?page=1&pageSize=20");
    const data = await res.json();
    if (!res.ok) {
      return;
    }
    const body = document.getElementById("usersBody");
    body.innerHTML = "";
    (data.data.items || []).forEach(function(user){
      const tr = document.createElement("tr");
      tr.innerHTML = "<td>" + user.id + "</td>" +
                     "<td>" + user.email + "</td>" +
                     "<td>" + user.role + "</td>" +
                     "<td>" + user.status + "</td>" +
                     "<td>" + (user.last_login_at || "-") + "</td>";
      body.appendChild(tr);
    });
    }

    async function loadRuns() {
    const res = await fetch("/api/v1/admin/runs?page=1&pageSize=30");
    const data = await res.json();
    if (!res.ok) {
      return;
    }

    async function loadLogs() {
    const res = await fetch("/api/v1/admin/logs?page=1&pageSize=30");
    const data = await res.json();
    if (!res.ok) {
      return;
    }
    const body = document.getElementById("logsBody");
    body.innerHTML = "";
    (data.data.items || []).forEach(function(log){
      const tr = document.createElement("tr");
      tr.innerHTML = "<td>" + log.id + "</td>" +
                     "<td>" + (log.user_id || "-") + "</td>" +
                     "<td>" + log.action + "</td>" +
                     "<td>" + log.target_type + "</td>" +
                     "<td>" + log.summary + "</td>" +
                     "<td>" + log.created_at + "</td>";
      body.appendChild(tr);
    });
    }
    const body = document.getElementById("runsBody");
    body.innerHTML = "";
    (data.data.items || []).forEach(function(run){
      const tr = document.createElement("tr");
      tr.innerHTML = "<td>" + run.id + "</td>" +
                     "<td>" + run.email + "</td>" +
                     "<td>" + run.status + "</td>" +
                     "<td>" + run.trigger_type + "</td>" +
                     "<td>" + run.started_at + "</td>" +
                     "<td>" + run.message + "</td>";
      body.appendChild(tr);
    });
    }
      document.getElementById("back").addEventListener("click", function(){ location.href = "/dashboard"; });
      document.getElementById("logout").addEventListener("click", async function(){
        await fetch("/api/v1/auth/logout", {method:"POST"});
        location.href = "/login";
      });
    });
  </script>
</body>
</html>
