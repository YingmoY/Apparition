<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apparition - 控制台</title>
  <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.9.17/css/layui.css" />
  <style>
    body { margin: 0; background: #f6f8fc; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 14px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); padding: 16px; margin-bottom: 16px; }
    .qr { width: 220px; height: 220px; border: 1px dashed #c6cfdd; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #f8fbff; }
    .qr img { max-width: 100%; max-height: 100%; }
    .label { color: #56637a; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
    <div>
      <h2 style="margin:0;">用户控制台</h2>
      <div id="userInfo" class="label">加载中...</div>
      <div id="cookieInfo" class="label">Cookie 状态：加载中...</div>
    </div>
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
      <button id="toAdmin" class="layui-btn layui-btn-primary layui-btn-sm">管理员后台</button>
      <button id="changePassword" class="layui-btn layui-btn-normal layui-btn-sm">修改密码</button>
      <button id="clearCookies" class="layui-btn layui-btn-warm layui-btn-sm">删除 Cookie</button>
      <button id="logout" class="layui-btn layui-btn-danger layui-btn-sm">退出登录</button>
    </div>
  </div>

  <!-- WPS QR Login -->
  <div class="card">
    <h3>WPS 二维码登录</h3>
    <button id="createSession" class="layui-btn">创建登录会话</button>
    <span id="sessionText" class="label"></span>
    <div style="margin-top:12px; display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap;">
      <div class="qr" id="qrBox">等待生成二维码</div>
      <div>
        <div id="statusText" class="label">状态：-</div>
        <div id="tsText" class="label">时间戳：-</div>
      </div>
    </div>
  </div>

  <!-- Clock-in Config -->
  <div class="card">
    <h3>打卡配置</h3>
    <div class="layui-row layui-col-space10">
      <div class="layui-col-md6"><input id="cfgTargetUrl" class="layui-input" placeholder="target_url (表单链接)" /></div>
      <div class="layui-col-md6"><input id="cfgInputName" class="layui-input" placeholder="input_name (学号&姓名)" /></div>
      <div class="layui-col-md6"><input id="cfgLongitude" class="layui-input" placeholder="longitude (经度)" /></div>
      <div class="layui-col-md6"><input id="cfgLatitude" class="layui-input" placeholder="latitude (纬度)" /></div>
      <div class="layui-col-md12"><input id="cfgAddress" class="layui-input" placeholder="formatted_address (打卡地址)" /></div>
    </div>
    <button id="saveProfile" class="layui-btn" style="margin-top:10px;">保存打卡配置</button>
  </div>

  <!-- Jobs -->
  <div class="card">
    <h3>调度任务</h3>
    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <select id="jobType" class="layui-select" style="width:160px;">
        <option value="daily">daily (每日定时)</option>
        <option value="fixed_interval">fixed_interval (固定间隔)</option>
      </select>
      <input id="jobValue" class="layui-input" style="max-width:240px;" placeholder="daily: HH:MM / interval: 秒" />
      <button id="createJob" class="layui-btn layui-btn-normal">创建任务</button>
    </div>
    <table class="layui-table" style="margin-top:10px;">
      <thead><tr><th>ID</th><th>类型</th><th>值</th><th>启用</th><th>下次执行</th><th>操作</th></tr></thead>
      <tbody id="jobsBody"></tbody>
    </table>
  </div>

  <!-- Run History -->
  <div class="card">
    <h3>执行历史</h3>
    <table class="layui-table">
      <thead><tr><th>ID</th><th>状态</th><th>触发</th><th>开始时间</th><th>结束时间</th><th>消息</th></tr></thead>
      <tbody id="runsBody"></tbody>
    </table>
    <div id="runsPager" style="text-align:center;"></div>
  </div>

  <!-- Audit Logs -->
  <div class="card">
    <h3>审计日志</h3>
    <table class="layui-table">
      <thead><tr><th>动作</th><th>目标</th><th>摘要</th><th>时间</th></tr></thead>
      <tbody id="auditBody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.staticfile.org/layui/2.9.17/layui.js"></script>
<script>
layui.use(["layer", "form"], function () {
  var layer = layui.layer;
  var currentSession = "";
  var pollTimer = 0;

  function api(url, opts) {
    return fetch(url, opts || {}).then(function (res) {
      var ct = res.headers.get("content-type") || "";
      if (ct.indexOf("application/json") >= 0) {
        return res.json().then(function (d) { return { ok: res.ok, data: d }; });
      }
      return { ok: res.ok, data: null };
    });
  }

  function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

  // --- Load user info ---
  function loadMe() {
    api("/api/v1/auth/me").then(function (r) {
      if (!r.ok) { location.href = "/login"; return; }
      var u = r.data.data;
      document.getElementById("userInfo").textContent = "用户: " + u.email + " | 角色: " + u.role;
      if (u.role !== "admin") document.getElementById("toAdmin").style.display = "none";
      if (u.must_change_password) layer.alert("当前账号必须修改密码后继续使用", {icon: 0});
    });
  }

  function loadCookieStatus() {
    api("/api/v1/cookies").then(function (r) {
      if (!r.ok) return;
      var info = r.data.data;
      document.getElementById("cookieInfo").textContent = "Cookie 状态: " + (info.exists ? (info.valid ? "有效" : "无效") : "未配置") + " | 数量: " + info.cookie_count;
    });
  }

  // --- Clock-in profile ---
  function loadClockinProfile() {
    api("/api/v1/clockin/profile").then(function (r) {
      if (!r.ok || !r.data.data) return;
      var d = r.data.data;
      document.getElementById("cfgTargetUrl").value = d.target_url || "";
      document.getElementById("cfgInputName").value = d.input_name || "";
      document.getElementById("cfgLongitude").value = d.longitude || "";
      document.getElementById("cfgLatitude").value = d.latitude || "";
      document.getElementById("cfgAddress").value = d.formatted_address || "";
    });
  }

  function saveClockinProfile() {
    var payload = {
      target_url: document.getElementById("cfgTargetUrl").value.trim(),
      input_name: document.getElementById("cfgInputName").value.trim(),
      longitude: Number(document.getElementById("cfgLongitude").value || "0"),
      latitude: Number(document.getElementById("cfgLatitude").value || "0"),
      formatted_address: document.getElementById("cfgAddress").value.trim(),
      user_agent: navigator.userAgent, locale: "zh-CN", accept_language: "zh-CN,zh;q=0.9",
      verify_cookies: "enable", timezone: "Asia/Shanghai"
    };
    api("/api/v1/clockin/profile", { method: "PUT", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) })
      .then(function (r) { layer.msg(r.ok ? "配置保存成功" : (r.data && r.data.message || "保存失败")); });
  }

  // --- Jobs ---
  function loadJobs() {
    api("/api/v1/clockin/jobs").then(function (r) {
      if (!r.ok) return;
      var body = document.getElementById("jobsBody");
      body.innerHTML = "";
      (r.data.data || []).forEach(function (job) {
        var tr = document.createElement("tr");
        tr.innerHTML = "<td>" + job.id + "</td><td>" + esc(job.schedule_type) + "</td><td>" + esc(job.schedule_value) + "</td>"
          + "<td>" + (job.enabled ? "是" : "否") + "</td><td>" + esc(job.next_run_at) + "</td>"
          + "<td><button class='layui-btn layui-btn-xs run-btn' data-id='" + job.id + "'>立即执行</button>"
          + "<button class='layui-btn layui-btn-xs layui-btn-warm toggle-btn' data-id='" + job.id + "' data-enabled='" + job.enabled + "'>"
          + (job.enabled ? "禁用" : "启用") + "</button></td>";
        body.appendChild(tr);
      });
    });
  }

  function createJob() {
    var payload = {
      enabled: true,
      schedule_type: document.getElementById("jobType").value,
      schedule_value: document.getElementById("jobValue").value.trim(),
      retry_policy: "immediate_once"
    };
    api("/api/v1/clockin/jobs", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) })
      .then(function (r) {
        layer.msg(r.ok ? "任务创建成功" : (r.data && r.data.message || "创建失败"));
        if (r.ok) loadJobs();
      });
  }

  function runJob(id) {
    api("/api/v1/clockin/jobs/" + id + "/run", { method: "POST" }).then(function (r) {
      if (!r.ok) { layer.msg(r.data && r.data.message || "执行失败"); return; }
      layer.msg("执行结果: " + r.data.data.status + " - " + r.data.data.message);
      loadJobs(); loadRuns();
    });
  }

  function toggleJob(id, currentEnabled) {
    api("/api/v1/clockin/jobs/" + id, {
      method: "PUT", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ enabled: !currentEnabled })
    }).then(function (r) {
      layer.msg(r.ok ? "操作成功" : "操作失败");
      if (r.ok) loadJobs();
    });
  }

  // --- Runs ---
  function loadRuns(page) {
    page = page || 1;
    api("/api/v1/clockin/runs?page=" + page + "&pageSize=20").then(function (r) {
      if (!r.ok) return;
      var body = document.getElementById("runsBody");
      body.innerHTML = "";
      (r.data.data.items || []).forEach(function (run) {
        var tr = document.createElement("tr");
        var statusClass = run.status === "success" ? "style='color:green'" : "style='color:red'";
        tr.innerHTML = "<td>" + run.id + "</td><td " + statusClass + ">" + esc(run.status) + "</td><td>" + esc(run.trigger_type)
          + "</td><td>" + esc(run.started_at) + "</td><td>" + esc(run.finished_at) + "</td><td>" + esc(run.message) + "</td>";
        body.appendChild(tr);
      });
    });
  }

  // --- Audit ---
  function loadAuditLogs() {
    api("/api/v1/audit/logs?page=1&pageSize=10").then(function (r) {
      if (!r.ok) return;
      var body = document.getElementById("auditBody");
      body.innerHTML = "";
      (r.data.data.items || []).forEach(function (item) {
        var tr = document.createElement("tr");
        tr.innerHTML = "<td>" + esc(item.action) + "</td><td>" + esc(item.target_type) + "</td><td>" + esc(item.summary) + "</td><td>" + esc(item.created_at) + "</td>";
        body.appendChild(tr);
      });
    });
  }

  // --- WPS ---
  function createWpsSession() {
    api("/api/v1/wps/sessions", { method: "POST" }).then(function (r) {
      if (!r.ok) { layer.msg(r.data ? r.data.message : "创建会话失败"); return; }
      currentSession = r.data.data.session_id;
      document.getElementById("sessionText").textContent = "会话ID: " + currentSession;
      refreshQR();
      pollStatus();
    });
  }

  function refreshQR() {
    if (!currentSession) return;
    var ts = Date.now();
    document.getElementById("tsText").textContent = "时间戳: " + ts;
    document.getElementById("qrBox").innerHTML = '<img alt="qr" src="/api/v1/wps/sessions/' + currentSession + '/qr?ts=' + ts + '" />';
  }

  function pollStatus() {
    clearInterval(pollTimer);
    pollTimer = setInterval(function () {
      api("/api/v1/wps/sessions/" + currentSession + "/status").then(function (r) {
        if (!r.ok) return;
        var s = r.data.data.status;
        document.getElementById("statusText").textContent = "状态: " + s + " - " + (r.data.data.message || "");
        if (s === "confirmed" || s === "failed") {
          clearInterval(pollTimer);
          if (s === "confirmed") loadCookieStatus();
        }
      });
    }, 2500);
  }

  // --- Actions ---
  function doChangePassword() {
    layer.prompt({title: "请输入当前密码", formType: 1}, function(currentPwd, idx1) {
      layer.close(idx1);
      layer.prompt({title: "请输入新密码（至少8位）", formType: 1}, function(newPwd, idx2) {
        layer.close(idx2);
        api("/api/v1/auth/change-password", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ currentPassword: currentPwd, newPassword: newPwd })
        }).then(function (r) { layer.msg(r.ok ? "密码修改成功" : (r.data && r.data.message || "修改失败")); });
      });
    });
  }

  function clearCookies() {
    layer.confirm("确定删除所有 Cookie？", function (idx) {
      layer.close(idx);
      api("/api/v1/cookies", { method: "DELETE" }).then(function (r) {
        layer.msg(r.ok ? "Cookie 已删除" : "删除失败");
        loadCookieStatus();
      });
    });
  }

  // --- Event bindings ---
  document.getElementById("createSession").addEventListener("click", createWpsSession);
  document.getElementById("saveProfile").addEventListener("click", saveClockinProfile);
  document.getElementById("createJob").addEventListener("click", createJob);
  document.getElementById("changePassword").addEventListener("click", doChangePassword);
  document.getElementById("clearCookies").addEventListener("click", clearCookies);
  document.getElementById("logout").addEventListener("click", function () {
    api("/api/v1/auth/logout", { method: "POST" }).then(function () { location.href = "/login"; });
  });
  document.getElementById("toAdmin").addEventListener("click", function () { location.href = "/admin"; });

  document.getElementById("jobsBody").addEventListener("click", function (e) {
    var btn = e.target;
    if (btn.classList.contains("run-btn")) { runJob(btn.getAttribute("data-id")); }
    if (btn.classList.contains("toggle-btn")) { toggleJob(btn.getAttribute("data-id"), btn.getAttribute("data-enabled") === "true"); }
  });

  // --- Init ---
  loadMe();
  loadCookieStatus();
  loadClockinProfile();
  loadJobs();
  loadRuns();
  loadAuditLogs();
});
</script>
</body>
</html>
